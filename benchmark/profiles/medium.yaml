# Medium profile — 50 tables, ~3M rows
# For full local validation
seed: 123
batch_size: 50000

schema:
  include:
    - sales.yaml
    - customer.yaml
    - marketing.yaml
    - metadata.yaml
    - noise.yaml

quality:
  null_ratio: 0.03
  fk_break_ratio: 0.005
  duplicate_ratio: 0.008
  late_arrival_ratio: 0.02
  outlier_ratio: 0.008

output:
  sqlite:
    path: benchmark/generated/sqlite/benchmark_medium.sqlite
